<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
  (function(){try{var k='theme',s=localStorage.getItem(k);if(s==='light'||s==='dark'){document.documentElement.setAttribute('data-theme',s);}else if(window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();
  (function(){try{var l=localStorage.getItem('lang');if(l==='pt'||l==='en'){document.documentElement.setAttribute('data-lang',l);document.documentElement.lang=l;}}catch(e){}})();
  </script>
  <title>Blog - Celine Oliveira Barros</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%234a7c59'>✿</text></svg>">
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/blog.css" />
  <style>
    /* ===== LANGUAGE TOGGLE ===== */
    [data-en] { display: inline; }
    [data-pt] { display: none; }
    html[data-lang="pt"] [data-en] { display: none; }
    html[data-lang="pt"] [data-pt] { display: inline; }

    [data-en-block] { display: block; }
    [data-pt-block] { display: none; }
    html[data-lang="pt"] [data-en-block] { display: none; }
    html[data-lang="pt"] [data-pt-block] { display: block; }

    [data-en-flex] { display: flex; }
    [data-pt-flex] { display: none; }
    html[data-lang="pt"] [data-en-flex] { display: none; }
    html[data-lang="pt"] [data-pt-flex] { display: flex; }

    .lang-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 400;
      letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-muted);
      background: none; border: none; cursor: pointer; padding: 0; margin: 0;
      position: relative; transition: color 0.3s; flex-shrink: 0; line-height: 1;
      vertical-align: middle; -webkit-appearance: none; appearance: none; gap: 0.35rem;
    }
    .lang-toggle::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 2px; background: var(--lavender); transition: width 0.3s;
    }
    .lang-toggle:hover { color: var(--lavender-deep); }
    .lang-toggle:hover::after { width: 100%; }
    .lang-toggle:focus-visible { outline: 2px solid var(--lavender); outline-offset: 3px; }
    .lang-toggle .lang-icon { font-size: 0.95rem; line-height: 1; }
    .lang-label-en, .lang-label-pt { pointer-events: none; }
    .lang-label-pt { display: none; }
    html[data-lang="pt"] .lang-label-en { display: none; }
    html[data-lang="pt"] .lang-label-pt { display: inline; }
  </style>
  <script src="./js/markdown-parser.js"></script>
  <script src="./js/blog-utils.js"></script>
</head>
<body>
  <nav class="site-nav" aria-label="Main">
    <div class="nav-inner">
      <a href="./index.html" class="nav-brand">Celine Oliveira Barros</a>
      <div class="nav-actions">
        <ul>
          <li class="nav-item--theme">
            <button type="button" class="theme-toggle" aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
              <span class="theme-toggle-label theme-toggle-label--dark" aria-hidden="true">
                <svg class="theme-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                Dark
              </span>
              <span class="theme-toggle-label theme-toggle-label--light" aria-hidden="true">
                <svg class="theme-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Light
              </span>
            </button>
          </li>
          <li class="nav-item--lang">
            <button type="button" class="lang-toggle lang-toggle--desktop" aria-label="Switch language">
              <span class="lang-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                  <path d="M12 2a10 10 0 100 20 10 10 0 000-20z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2.05 12h19.9M12 2.05v19.9M6.6 6.6l10.8 10.8M17.4 6.6L6.6 17.4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="lang-label-en">PT-BR</span>
              <span class="lang-label-pt">en</span>
            </button>
          </li>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./blog.html">Blog</a></li>
          <li><a href="./resume.html">Resume</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="blog-container">
      <header class="blog-page-header" aria-labelledby="blog-heading">
        <!-- <p class="page-label"><span data-en>Writing</span><span data-pt>Escrita</span></p> -->
        <h1 id="blog-heading" class="blog-title"><span data-en>Blog</span><span data-pt>Blog</span></h1>
        <p class="page-subtitle"><span data-en>Thoughts on psychology, life, art, and everything in between.</span><span data-pt>Pensamentos sobre psicologia, vida, arte e tudo mais.</span></p>
      </header>

      <div id="posts-listing" class="posts-listing">
        <p class="posts-loading" role="status">Loading posts…</p>
      </div>
    </div>
  </main>

  <script src="./js/theme.js"></script>
  <script>
    // ===== LANGUAGE TOGGLE =====
    (function () {
      var STORAGE_KEY = 'lang';

      function getStored() {
        try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
      }

      function getEffectiveLang() {
        var s = getStored();
        if (s === 'en' || s === 'pt') return s;
        return 'en';
      }

      function applyLang(lang) {
        document.documentElement.setAttribute('data-lang', lang);
        document.documentElement.lang = lang;
      }

      function toggle() {
        var current = document.documentElement.getAttribute('data-lang') || 'en';
        var next = current === 'pt' ? 'en' : 'pt';
        try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
        applyLang(next);
      }

      applyLang(getEffectiveLang());

      document.addEventListener('click', function (e) {
        if (e.target.closest('.lang-toggle')) {
          e.preventDefault();
          toggle();
        }
      });
    })();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', renderBlogListing);
  </script>
  <script defer src="https://va.vercel-scripts.com/v1/script.js"></script>
</body>
</html>
